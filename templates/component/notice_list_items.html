{% comment %} 這是管理範本頁面 {% endcomment %}
<div class="accordion-item create-mode"
     id="add-notice-form"
     style="display: none">
    <form hx-post="{% url 'manage-template' %}"
          hx-target="#template-list-container"
          hx-swap="innerHTML"
          hx-on:htmx:after-request="if(event.detail.successful) uiReset();">
        {% csrf_token %}
        <input type="hidden" name="id" id="editTempId" value="">
        <input type="hidden" name="action" value="save">
        <div class="accordion-header no-cursor">
            <input type="text"
                   name="title"
                   id="newNoticeTitle"
                   class="input-title-field"
                   placeholder="範本名稱"
                   required>
        </div>
        <div class="accordion-body is-visible" style="display: block;">
            <div class="accordion-inner">
                <textarea name="content"
                          id="newNoticeContent"
                          class="input-content-area"
                          placeholder="輸入內容..."
                          required></textarea>
                <div class="temp-actions">
                    <div class="split-tool">
                        <div class="split-left">
                            <button type="button" class="template-btn" onclick="uiReset()">取消</button>
                        </div>
                        <div class="split-right">
                            <button type="submit" class="template-btn edit-template">儲存範本</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<div id="template-list-container">
    {% for notice in notices %}
        <div class="accordion-item" id="notice-item-{{ notice.id }}">
            <div class="accordion-header">
                <div class="split-tool">
                    <div class="split-left">
                        <h3 class="temp-title">{{ notice.title }}</h3>
                    </div>
                    <div class="split-right">
                        <span class="temp-arrow">{% include "icons/next.html" %}</span>
                    </div>
                </div>
            </div>
            <div class="accordion-body">
                <div class="accordion-inner">
                    <div class="temp-content-text">{{ notice.content }}</div>
                    <div class="temp-actions">
                        <div class="split-tool">
                            <div class="split-left">
                                <button class="template-btn delete-template"
                                        hx-post="{% url 'manage-template' %}"
                                        hx-vals='{"id": "{{ notice.id }}", "action": "delete"}'
                                        hx-target="#notice-item-{{ notice.id }}"
                                        hx-swap="outerHTML swap:300ms"
                                        hx-confirm="確定要刪除嗎？">刪除</button>
                            </div>
                            <div class="split-right">
                                <button class="template-btn edit-template"
                                        onclick="openEditForm('{{ notice.id }}', '{{ notice.title|escapejs }}', '{{ notice.content|escapejs }}', this)">
                                    編輯
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    {% endfor %}
    <p class="no-template-hint">目前沒有範本，點擊右上方新增一個吧！</p>
</div>
