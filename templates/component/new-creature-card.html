<a class="product-creature"
   id="product-card-{{ item.id }}"
   href="{% url 'product_detail' item.id %}">
    <div class="fissh-card-menu-wrap">
        <div class="fissh-card-menu-dots">{% include "icons/ellipsis-vertical.html" %}</div>
        <div class="fissh-card-menu-pane">
            <div class="fissh-card-menu-row"
                 hx-get="{% url 'edit-product' item.id %}"
                 hx-target="#edit-modal-container"
                 hx-swap="innerHTML"
                 hx-on:htmx:after-request="if(event.detail.successful) openEditModal()"
                 onclick="event.preventDefault(); event.stopPropagation();">編輯商品</div>
            {% if is_inactive %}
                <div class="fissh-card-menu-row"
                     onclick="runFisshCardAction(event, 'relist', '{{ item.id }}')">上架商品</div>
            {% else %}
                <div class="fissh-card-menu-row"
                     onclick="runFisshCardAction(event, 'delist', '{{ item.id }}')">下架商品</div>
            {% endif %}
            <div class="fissh-card-menu-row fissh-danger-node"
                 onclick="runFisshCardAction(event, 'delete', '{{ item.id }}')">刪除商品</div>
        </div>
    </div>
    {% if item.image %}
        <img src="{{ item.image.url }}"
             style="width: 100%;
                    height: 200px;
                    object-fit: cover;
                    display: block"
             alt="{{ item.name }}">
    {% elif item.video %}
        <video src="{{ item.video.url }}#t=0.001"
               preload="metadata"
               muted
               playsinline
               style="width: 100%;
                      height: 200px;
                      object-fit: cover;
                      display: block">
        </video>
    {% else %}
        <div style="width: 100%;
                    height: 200px;
                    background-color: var(--bg-light);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: var(--text-muted)">尚無影片</div>
    {% endif %}
    <h3 class="product-creature-title">{{ item.name }}</h3>
    <p class="product-creature-subtitle">NT$ {{ item.price }}</p>
</a>
