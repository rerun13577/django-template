<div class="modal-overlay"
     id="profile-edit-modal"
     style="display: flex !important">
    <div class="modal-content-card">
        <div class="profile-header">
            <button class="modal-close-x"
                    onclick="document.getElementById('profile-edit-modal').remove()">✕</button>
            <h3 class="profile-title">編輯個人資料</h3>
        </div>
        <div class="input-article-content">
            <form hx-post="{% url 'update_profile' username=profile.user.username %}"
                  hx-target="#profile-info-section"
                  hx-encoding="multipart/form-data"
                  enctype="multipart/form-data"
                  hx-swap="outerHTML"
                  id="profile-edit-form"
                  class="profile-form-container">
                {% csrf_token %}
                <div class="input-field-group">
                    <label class="field-label">個人暱稱</label>
                    <input type="text"
                           name="nickname"
                           value="{{ profile.nickname }}"
                           class="clean-underlined-input"
                           placeholder="你的專屬暱稱...">
                </div>
                <div class="input-field-group">
                    <label class="field-label">點照片更換大頭貼</label>
                    <div class="clean-file-box">
                        <label for="modal-avatar-input" class="avatar-click-zone">
                            <div id="avatar-preview" class="image-preview-container">
                                {% if profile.avatar %}
                                    <div class="image-preview-avatar">
                                        <img src="{{ profile.avatar.url }}" class="image-preview" alt="舊圖">
                                        <button type="button" class="remove-image-btn">&times;</button>
                                    </div>
                                {% else %}
                                    <div class="profile-placeholder">
                                        <div class="upload-icon-wrapper">{% include "icons/upload.html" %}</div>
                                        <span class="upload-text">點擊上傳頭貼</span>
                                    </div>
                                {% endif %}
                            </div>
                        </label>
                        <input type="file"
                               name="avatar"
                               id="modal-avatar-input"
                               accept="image/*"
                               class="profile-image-input"
                               data-preview="#avatar-preview"
                               style="display: none">
                    </div>
                </div>
                <div class="input-field-group">
                    <label class="field-label">點照片更換背景圖</label>
                    <div class="clean-file-box">
                        <label for="background-input" class="bg-click-zone">
                            <div id="background-preview" class="image-preview-container">
                                {% if profile.background_image %}
                                    <div class="image-preview-wrapper">
                                        <img src="{{ profile.background_image.url }}"
                                             class="image-preview"
                                             alt="現有背景">
                                        <button type="button" class="remove-image-btn">&times;</button>
                                    </div>
                                {% else %}
                                    <div class="profile-placeholder">
                                        <div class="upload-icon-wrapper">{% include "icons/upload.html" %}</div>
                                        <span class="upload-text">點擊上傳背景</span>
                                    </div>
                                {% endif %}
                            </div>
                        </label>
                        <input type="file"
                               name="background_image"
                               id="background-input"
                               accept="image/*"
                               class="profile-image-input"
                               data-preview="#background-preview"
                               style="display: none">
                    </div>
                </div>
                <div class="input-field-group">
                    <label class="field-label">你的地點</label>
                    <div class="clean-location-grid">
                        <div class="grid-cell">
                            <span>選擇縣市</span>
                            <select id="city-select" onchange="updateZoneOptions()">
                                <option value="">-- 縣市 --</option>
                                {% for city in taiwan_regions.keys %}
                                    <option value="{{ city }}" {% if current_city == city %}selected{% endif %}>{{ city }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="grid-cell">
                            <span>選擇區域</span>
                            <select id="zone-select" onchange="combineFullAddress()">
                                <option value="">-- 區域 --</option>
                            </select>
                        </div>
                        <div class="grid-cell wide-cell">
                            <span>路名/面交點</span>
                            <input type="text"
                                   name="address_detail"
                                   value="{{ profile.address_detail }}"
                                   placeholder="如：景安捷運站">
                        </div>
                    </div>
                </div>
                <input type="hidden"
                       name="city_region"
                       id="hidden-city-region"
                       value="{{ profile.city_region }}">
                <div class="input-field-group">
                    <label class="field-label">自我介紹</label>
                    <textarea name="bio"
                              rows="1"
                              class="clean-underlined-textarea"
                              placeholder="聊聊你的魚缸或蝦缸吧...">{{ profile.bio }}</textarea>
                </div>
                <div class="input-field-group">
                    <label class="field-label">聯絡連結 例如：群組</label>
                    <!-- 💡 物理變更：網址不需要換行，所以用 input type="url" 最精準 -->
                    <input type="url"
                           name="contact_link"
                           class="clean-underlined-input"
                           placeholder="請貼上你的 聯絡連結 (https://line.me/...)"
                           value="{{ profile.contact_link }}">
                </div>
                <div class="input-field-group">
                    <label for="hide-price-select" class="field-label">商品價格顯示方式</label>
                    <p class="field-hint">此設定會套用到你目前及未來上架的所有商品。</p>
                    <div class="clean-select-wrapper">
                        <select name="price_visibility"
                                id="hide-price-select"
                                class="clean-profile-select">
                            <option value="0" {% if not profile.price_visibility %}selected{% endif %}>公開顯示價格</option>
                            <option value="1" {% if profile.price_visibility %}selected{% endif %}>追蹤商家後顯示價格</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="save-profile-btn">送出</button>
            </form>
        </div>
    </div>
    <!-- 🚀 資料探針：把後端的 JSON 資料偷偷交給 DOM，供外部 profile.js 讀取 -->
    <div id="js-taiwan-regions-data"
         data-json="{{ taiwan_regions_json }}"
         style="display: none"></div>
</div>
