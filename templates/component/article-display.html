{% load static %}
<div class="article">
    <!-- a標籤做一個遮罩 可以把整個article遮起來 然後點讚變成更高層的z這樣就不會遮住 -->
    <a href="{{ post.get_absolute_url }}" class="article-link"></a>
    {% if post.image %}
        <img src="{{ post.get_image_url }}"
             alt="{{ post.title }}"
             class="article-photo"
             loading="lazy"
             onerror=" this.src = 'https://media.fisshshop.com/media/default-photo/IMG_2842.webp'; this.onerror = null; " />
    {% else %}
        {% comment %} 允許可以沒有封面照片 {% endcomment %}
        <div class="no-article-photo" style="height: 1rem"></div>
    {% endif %}
    <div class="content">
        {% comment %} 發布者照片 {% endcomment %}
        {% include "component/user-photo.html" with target_user=post.author custom_class="maker-photo" %}
        <div class="content-without-maker-photo">
            <a href="/" class="maker-name">{{ post.author.username }}</a>
            <h3 class="article-title">{{ post.title }}</h3>
            <div class="action-s">
                <button class="action-btn like-btn {% if post.is_liked %}liked{% endif %}"
                        data-post-id="{{ post.id }}"
                        aria-label="按讚"
                        data-authenticated="{{ user.is_authenticated|yesno:'true,false' }}">
                    {% include "icons/heart.html" %}
                    <span class="action-num">{{ post.like_count }}</span>
                </button>
                <button class="action-btn" aria-label="留言">
                    {% include "icons/comment.html" %}
                    <span class="action-num">{{ post.comment_count }}</span>
                </button>
                <button class="action-btn" aria-label="分享">{% include "icons/share.html" %}</button>
            </div>
        </div>
    </div>
</div>
