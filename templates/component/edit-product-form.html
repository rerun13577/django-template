<div class="fissh-modal-box">
    <div class="modal-header"
         style="display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem;
                border-bottom: 1px solid var(--border-muted)">
        <h3 style="margin: 0; font-size: 1.1rem;">編輯小魚資料</h3>
        <button type="button"
                onclick="closeEditModal()"
                style="background: transparent;
                       border: none;
                       cursor: pointer;
                       color: var(--text-muted)">{% include "icons/cross.html" %}</button>
    </div>
    <div class="fissh-modal-inbox">
        <form hx-post="{% url 'edit-product' item.pk %}"
              hx-target="#product-card-{{ item.pk }}"
              hx-swap="outerHTML"
              id="editFishForm"
              enctype="multipart/form-data"
              style="display: block">
            {% csrf_token %}
            <div class="single-card-sizing">
                <div class="slot-field1 photo-upload-container">
                    <div class="main-cover-box single-photo-ratio"
                         data-active-slot="1"
                         onclick="triggerActiveInput(event)">
                        <div class="custom-upload-box"
                             style="position: relative;
                                    width: 100%;
                                    height: 100%">
                            <div class="upload-placeholder viewport-placeholder"
                                 {% if item.video %}style="display: none;"{% endif %}>
                                {% include 'icons/upload.html' %}
                                <span style="font-size: 0.85rem;
                                             color: var(--text-muted);
                                             margin-top: 0.5rem;
                                             display: block">點擊更換影片</span>
                            </div>
                            <input type="file"
                                   id="fish-video-input"
                                   name="video"
                                   accept="video/mp4,video/webm"
                                   onchange="handleVideoUpload(this)"
                                   style="display: none">
                            <video class="preview-video viewport-video"
                                   {% if item.video %} src="{{ item.video.url }}" style="display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2" {% else %} style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2" {% endif %}
                                   loop
                                   playsinline
                                   autoplay>
                            </video>
                            <button class="delete-prod-pic-btn"
                                    type="button"
                                    onclick="removeActivePhoto(event)"
                                    {% if item.video %}style="display: block; z-index: 10;"{% else %}style="display: none; z-index: 10;"{% endif %}>
                                {% include "icons/cross.html" %}
                            </button>
                        </div>
                    </div>
                </div>
                <div class="slot-field1">
                    <label class="cover-upload-box"
                           style="display: flex;
                                  align-items: center;
                                  justify-content: space-between;
                                  padding: 0.6rem;
                                  border: 1px solid var(--border-muted);
                                  border-radius: var(--radius-s);
                                  cursor: pointer;
                                  background-color: var(--bg-dark)">
                        <span style="color: var(--text-muted); font-size:0.9rem">更換封面圖</span>
                        <span id="cover-filename-display"
                              style="font-size: 0.85rem;
                                     color: var(--secondary);
                                     max-width: 60%;
                                     overflow: hidden;
                                     text-overflow: ellipsis;
                                     white-space: nowrap">
                            {% if item.image %}
                                已有封面，點擊可替換
                            {% else %}
                                尚未選擇封面檔案
                            {% endif %}
                        </span>
                        <input type="file"
                               name="fish-cover"
                               accept="image/*"
                               style="display: none"
                               onchange="updateCoverFilename(this)">
                    </label>
                </div>
                <div class="slot-field1">
                    <input type="text"
                           name="fish_name"
                           placeholder="品種名稱 (如：極火蝦)"
                           data-label="品種名稱"
                           value="{{ item.name }}"
                           required>
                </div>
                <div class="slot-field1">
                    <input type="number"
                           name="fish_price"
                           placeholder="單價"
                           data-label="單價"
                           value="{{ item.price }}"
                           required>
                </div>
                <div class="expand-grid-layout">
                    <div class="slot-field1 template-group">
                        <select name="fish_spec" data-label="規格範本">
                            <option value="">選擇規格範本...</option>
                            {% for s in spec_templates %}
                                <option value="{{ s.id }}" {% if item.spec.id == s.id %}selected{% endif %}>{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="slot-field1 template-group">
                        <select name="fish_notice" data-label="提醒範本">
                            <option value="">選擇提醒範本...</option>
                            {% for n in notices %}
                                <option value="{{ n.id }}"
                                        {% if item.notice_template_id == n.id %}selected{% endif %}>
                                    {{ n.title }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="batch-actions">
                    <div class="split-tool">
                        <div class="split-left"></div>
                        <div class="split-right">
                            <button type="submit" class="template-btn">儲存修改</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
