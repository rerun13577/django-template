{% load static %}
<a class="product-creature" href="{% url 'product_detail' item.id %}">
    {% if item.image %}
        <img src="{{ item.image.url }}"
             style="width: 100%;
                    height: 200px;
                    object-fit: cover;
                    display: block"
             class="product-source"
             alt="{{ item.name }}">
    {% elif item.video %}
        <video src="{{ item.video.url }}#t=0.001"
               preload="metadata"
               muted
               playsinline
               style="width: 100%;
                      height: 200px;
                      object-fit: cover;
                      display: block"
               class="product-source">
        </video>
    {% else %}
        <div style="width: 100%;
                    height: 200px;
                    background-color: var(--bg-light);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: var(--text-muted)">尚無影片</div>
    {% endif %}
    <h3 class="product-creature-title">{{ item.name }}</h3>
    {# ProfileView 已經根據本人、追蹤狀態與商家設定算好結果 #}
    {% if not should_hide_price %}
        <p class="product-creature-subtitle">NT$ {{ item.price }}</p>
    {% elif price_visibility == "HIDDEN" %}
        <p class="product-creature-subtitle non-sale">價格詢問官方</p>
    {% else %}
        <p class="product-creature-subtitle non-sale">追蹤解鎖價格</p>
    {% endif %}
</a>
