{% load static %}

<template id="photo-item-template">
  <div class="photo-item">
    <img src="" class="photo-preview" />
    <button type="button" class="remove-photo" onclick="this.parentElement.remove()">
      {% include "icons/cross.html" %}
    </button>
  </div>
</template>

<div class="input-area-card">
  <div class="input-card-header">
    <p class="input-title">照片框</p>
    <button class="delete-btn" type="button">
      {% include "icons/cross.html" %}
    </button>
  </div>

  <div class="input-photo-area">
    <div class="photo-viewport" data-index="0">
      <!-- 避免抓不到數字閃退 -->
      <button
        class="trasform-btn prev"
        type="button"
        onclick="moveSlide(-1, this)"
      >
        {% include "icons/next.html" %}
      </button>

      <div class="photo-item-s">
        <div class="photo-item upload-item">
          <label class="photo-upload">
            <input
              type="file"
              accept="image/*"
              hidden
              onchange="handleFileUpload(this)"
            />
            <!-- 只能上傳圖片 -->
            <i class="upload-icon"> {% include "icons/upload.html" %}</i>
            <span>點擊上傳照片</span>
          </label>
        </div>

        <!-- <div class="photo-item">
          <img src="" class="photo-preview" />
        </div> -->
      </div>

      <button
        class="trasform-btn next"
        type="button"
        onclick="moveSlide(1, this)"
      >
        {% include "icons/next.html" %}
      </button>
    </div>
  </div>
</div>
