<div class="manage-layout" id="manageLayout">
    <div id="setupSection" class="split-tool setup-banner">
        <div class="split-left">
            <h1 class="add-title">輸入格數</h1>
        </div>
        <div class="split-right">
            <div class="setup-controls">
                <input type="number"
                       id="batchCountInput"
                       value="5"
                       min="1"
                       max="20"
                       class="batch-num-input">
                <button type="button"
                        class="confirm-batch-btn"
                        onclick="handleBatchConfirm()">生成</button>
            </div>
        </div>
    </div>
    {% comment %} 這個輸入完我會讓他消失 {% endcomment %}
    <div class="show-pre-add" id="batchSlotsContainer">
        <div class="slot-item">
            <div class="split-tool ">
                <div class="split-left">
                    <div class="slot-header">第 ${i} 隻生物</div>
                </div>
                <div class="split-right">
                    <button type="button"
                            class="remove-slot-btn"
                            onclick="this.closest('.slot-item').remove(); updateSlotNumbers();"
                            title="移除此格">X</button>
                </div>
            </div>
            <div class="slot-field">
                <label class="custom-upload-box">
                    <input type="file"
                           name="fish_image[]"
                           accept="image/*"
                           onchange="handlePreview(this)"
                           style="display: none">
                    <div class="upload-placeholder">
                        <span>+ 上傳照片</span>
                    </div>
                    <img class="preview-img" src="" style="display: none;">
                </label>
            </div>
            <div class="slot-field">
                <input type="text" name="fish_name[]" placeholder="輸入名稱 (如：極火蝦)">
            </div>
            <div class="slot-field field-with-btn">
                <input type="number" name="fish_price[]" placeholder="單價">
                <button type="button"
                        class="apply-all-btn"
                        onclick="syncAll('fish_price[]', this)"
                        title="將此價格套用到所有格子">套用全部</button>
            </div>
            <div class="slot-field field-with-btn">
                <select name="fish_spec[]">
                    <option value="">選擇規格範本...</option>
                    {% for s in spec_templates %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                </select>
                <button type="button"
                        class="apply-all-btn"
                        onclick="syncAll('fish_spec[]', this)"
                        title="將此規格套用到所有格子">套用</button>
            </div>
            <div class="slot-field field-with-btn">
                <select name="fish_notice[]">
                    <option value="">選擇提醒範本...</option>
                    {% for n in notices %}<option value="{{ n.id }}">{{ n.title }}</option>{% endfor %}
                </select>
                <button type="button"
                        class="apply-all-btn"
                        onclick="syncAll('fish_notice[]', this)"
                        title="將此提醒套用到所有格子">套用</button>
            </div>
        </div>
    </div>
</div>
{% comment %} 你必須寫在script裡面，
因為這樣才能在 JS 裡面使用這兩個變數（GLOBAL_SPEC_OPTIONS 和 GLOBAL_NOTICE_OPTIONS）來生成下拉選單的內容。這樣做的好處是，你只需要在 HTML 模板裡面定義一次選項，然後在 JS 裡面就可以重複使用，避免了重複的 HTML 代碼，也讓你的 JS 更加靈活和易於維護。 {% endcomment %}
<script>
const GLOBAL_SPEC_OPTIONS = `
    <option value="">選擇規格範本...</option>
    {% for s in spec_templates %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
`;

const GLOBAL_NOTICE_OPTIONS = `
    <option value="">選擇提醒範本...</option>
    {% for n in notices %}<option value="{{ n.id }}">{{ n.title }}</option>{% endfor %}
`;

const ICON_X = `

`;
