<div class="fissh-modal-box">
    <div class="modal-header"
         style="display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem;
                border-bottom: 1px solid var(--border-muted)">
        <h3 style="margin: 0; font-size: 1.1rem;">編輯商品</h3>
        <button type="button"
                class="modal-close-btn"
                onclick="closeEditModal()"
                aria-label="關閉編輯視窗"
                style="background: transparent;
                       border: none;
                       cursor: pointer;
                       color: var(--text-muted)">{% include "icons/cross.html" %}</button>
    </div>
    <div class="fissh-modal-inbox custom-scrollbar">
        <form hx-post="{% url 'edit-product' item.pk %}"
              hx-target="#product-card-{{ item.pk }}"
              hx-swap="outerHTML"
              id="editFishForm"
              enctype="multipart/form-data"
              style="display: block">
            {% csrf_token %}
            <div class="single-card-sizing">
                <!-- 影片 -->
                <div class="slot-field1 photo-upload-container">
                    <div class="main-cover-box single-photo-ratio"
                         data-active-slot="1"
                         onclick=" if (!event.target.closest('.delete-prod-pic-btn')) { this.querySelector('input[name=video]').click(); } ">
                        <div class="custom-upload-box"
                             style="position: relative;
                                    width: 100%;
                                    height: 100%">
                            <div class="upload-placeholder viewport-placeholder"
                                 {% if item.video %}style="display: none"{% endif %}>
                                {% include "icons/upload.html" %}
                                <span style="font-size: 0.85rem;
                                             color: var(--text-muted);
                                             margin-top: 0.5rem;
                                             display: block">點擊更換影片</span>
                            </div>
                            <input type="file"
                                   name="video"
                                   accept="video/mp4,video/webm,video/quicktime"
                                   onchange="handleVideoUpload(this)"
                                   style="display: none">
                            <video class="preview-video viewport-video"
                                   {% if item.video %} src="{{ item.video.url }}" style="display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2" {% else %} style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2" {% endif %}
                                   preload="auto"
                                   autoplay
                                   loop
                                   muted
                                   playsinline
                                   onloadedmetadata=" this.muted = true; this.play().catch(() => {}); ">
                            </video>
                            <button class="delete-prod-pic-btn"
                                    type="button"
                                    onclick="removeActivePhoto(event)"
                                    {% if item.video %} style="display: flex; z-index: 10" {% else %} style="display: none; z-index: 10" {% endif %}>
                                {% include "icons/cross.html" %}
                            </button>
                        </div>
                    </div>
                </div>
                <!-- 封面圖 -->
                <div class="slot-field1">
                    <label class="cover-upload-box">
                        <span class="cover-upload-label">更換封面圖</span>
                        <span class="cover-filename">
                            {% if item.image %}
                                已有封面，點擊可替換
                            {% else %}
                                尚未選擇封面檔案
                            {% endif %}
                        </span>
                        <input type="file"
                               name="fish-cover"
                               accept="image/*"
                               onchange="updateCoverFilename(this)"
                               hidden>
                    </label>
                </div>
                <!-- 品種名稱 -->
                <div class="slot-field1">
                    <input type="text"
                           name="fish_name"
                           value="{{ item.name }}"
                           placeholder="品種名稱 (如：極火蝦)"
                           data-label="品種名稱"
                           required>
                </div>
                <!-- 價格與種類 -->
                <div class="expand-grid-layout">
                    <div class="slot-field1">
                        <input type="number"
                               name="fish_price"
                               value="{{ item.price }}"
                               min="0"
                               placeholder="單價"
                               data-label="單價"
                               required>
                    </div>
                    <div class="slot-field1">
                        <select name="fish_category" data-label="產品種類" required>
                            <option value="" disabled>選擇產品種類</option>
                            {% for value, label in aquatic_categories.items %}
                                <option value="{{ value }}"
                                        {% if item.category == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <!-- 溫度與體長 -->
                <div class="expand-grid-layout">
                    <div class="slot-field1 input-with-unit">
                        <input type="text"
                               name="fish_temp"
                               value="{{ item.temp|default_if_none:'' }}"
                               maxlength="50"
                               placeholder="適合溫度，例如：24～28"
                               data-label="適合溫度">
                        <span class="input-unit">°C</span>
                    </div>
                    <div class="slot-field1 input-with-unit">
                        <input type="text"
                               name="fish_body_length"
                               value="{{ item.body_length|default_if_none:'' }}"
                               maxlength="50"
                               placeholder="參考體長，例如：3～5"
                               data-label="參考體長">
                        <span class="input-unit">cm</span>
                    </div>
                </div>
                <!-- 商品備註 -->
                <div class="slot-field1 product-note-field">
                    <label for="edit-fish-description-{{ item.pk }}">商品備註</label>
                    <textarea id="edit-fish-description-{{ item.pk }}"
                              class="input-content-area"
                              name="fish_description"
                              rows="5"
                              maxlength="2000"
                              placeholder="可填寫飼養資訊、交易方式、出貨提醒等">{{ item.description|default_if_none:"" }}</textarea>
                </div>
                <!-- 儲存按鈕 -->
                <div class="batch-actions">
                    <div class="split-tool">
                        <div class="split-left"></div>
                        <div class="split-right">
                            <button type="submit" class="template-btn">儲存修改</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<script>
    requestAnimationFrame(() => {
        const modal = document.getElementById("edit-modal-container");

        if (modal) {
            modal.classList.add("show");
        }

        const video = modal?.querySelector(".preview-video");

        if (video && video.src) {
            video.muted = true;
            video.play().catch(() => {});
        }
    });
    function closeEditModal() {
    const modal = document.getElementById("edit-modal-container");
    const header = document.querySelector(".mobile-header");

    if (!modal) return;

    modal.querySelectorAll("video").forEach((video) => {
        video.pause();

        if (video.src.startsWith("blob:")) {
        URL.revokeObjectURL(video.src);
        }
    });

    modal.classList.remove("show");
    document.body.style.overflow = "";

    if (header) {
        header.classList.remove("modal-is-open");
        header.classList.remove("is-hidden");
    }

    // 同步目前位置，避免下一次 scroll 判斷錯誤
    lastScrollY = window.scrollY;

    setTimeout(() => {
        if (!modal.classList.contains("show")) {
        modal.innerHTML = "";
        }
    }, 200);
    }

// 讓 HTML onclick="closeEditModal()" 可以找到
window.closeEditModal = closeEditModal;

// 對應後端 response["HX-Trigger"] = "closeEditModal"
document.body.addEventListener("closeEditModal", () => {
  closeEditModal();
});
</script>
