{% load static %}
<!-- 在外框設計一個id讓js去抓取，然後在js裡面寫一個事件監聽器，當點擊這個按鈕的時候就把模態框顯示出來。 -->
<div class="add-article-overlay" id="manage-notice-overlay">
    <div class="add-article-page">
        <header class="page-header">
            <button class="action-btn back-btn" onclick="closeNoticeModal()">{% include "icons/back.html" %}</button>
            <h2 class="page-title">管理範本</h2>
            <button class="post-btn" id="addNewTempBtn">新增</button>
        </header>
        {% comment %} 範本form {% endcomment %}
        <div class="input-article-content" id="template-list-container">
            <div class="accordion-item create-mode"
                 id="add-template-form"
                 style="display: none">
                <input type="hidden" id="editTempId" value="">
                <div class="accordion-header no-cursor">
                    <input type="text"
                           class="input-title-field"
                           id="newNoticeTitle"
                           maxlength="200"
                           placeholder="範本名稱">
                </div>
                <div class="accordion-body is-visible">
                    <div class="accordion-inner">
                        <textarea class="input-content-area"
                                  id="newNoticeContent"
                                  placeholder="在此輸入範本內容..."></textarea>
                        <div class="temp-actions">
                            <div class="split-tool">
                                <div class="split-left">
                                    <button class="template-btn  delete-template" onclick="toggleAddForm()">取消</button>
                                </div>
                                <div class="split-right">
                                    <button id="saveNoticeBtn" class="template-btn edit-template">儲存</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% for notice in notices %}
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div class="split-tool">
                            <div class="split-left">
                                <h3 class="temp-title">{{ notice.title|default:"未命名範本" }}</h3>
                            </div>
                            <div class="split-right">
                                <span class="temp-arrow">{% include "icons/next.html" %}</span>
                            </div>
                        </div>
                    </div>
                    <div class="accordion-body">
                        <div class="accordion-inner">
                            <div class="temp-content-text">{{ notice.content|linebreaks }}</div>
                            <div class="temp-actions">
                                <div class="split-tool">
                                    <div class="split-left">
                                        <button class="template-btn delete-template"
                                                onclick="deleteTemplate('{{ notice.id }}', this)">刪除</button>
                                    </div>
                                    <div class="split-right">
                                        <button class="template-btn edit-template"
                                                onclick="openEditForm('{{ notice.id }}', '{{ notice.title|escapejs }}', '{{ notice.content|escapejs }}', this)">
                                            編輯
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            {% empty %}
                <p class="empty-hint">目前沒有範本，點擊右上方新增一個吧！</p>
            {% endfor %}
        </div>
    </div>
</div>
<!-- 
 這裡是新增文章的模態框，裡面有兩個template，一個是文字區塊的template，
一個是圖片區塊的template，這樣在js裡面就可以很方便的去複製這兩個template來新增區塊了。
-->
<!-- 導入邏輯 -->
<script src="{% static 'aquatic/js/manage-temp.js' %}"></script>
