{% load static %}
<a class="product-creature" href="{% url 'product_detail' item.id %}">
    {% if item.image %}
        <img src="{{ item.image.url }}"
             style="width: 100%;
                    height: 200px;
                    object-fit: cover;
                    display: block"
             alt="{{ item.name }}">
    {% elif item.video %}
        <video src="{{ item.video.url }}#t=0.001"
               preload="metadata"
               muted
               playsinline
               style="width: 100%;
                      height: 200px;
                      object-fit: cover;
                      display: block">
        </video>
    {% else %}
        <div style="width: 100%;
                    height: 200px;
                    background-color: var(--bg-light);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: var(--text-muted)">尚無影片</div>
    {% endif %}
    <h3 class="product-creature-title">{{ item.name }}</h3>
    {% if item.price_status == 'NOT_FOR_SALE' %}
        <p class="product-creature-subtitle non-sale">無價珍寶</p>
    {% else %}
        <p class="product-creature-subtitle">NT$ {{ item.price }}</p>
    {% endif %}
</a>
